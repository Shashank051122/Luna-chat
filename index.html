<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- 🔥 LOGIN / REGISTER SCREEN -->
<div class="login-screen">

    <h1 class="app-title">LUNA</h1>

    <!-- START SCREEN -->
    <div id="startScreen">
        <button class="btn btn-primary w-100 mb-2" id="goLogin">Login</button>
        <button class="btn btn-secondary w-100" id="goRegister">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm" class="d-none">
        <h3>Login</h3>

        <input type="text" id="loginId" placeholder="User ID"><br><br>
        <input type="password" id="loginPass" placeholder="Password"><br><br>

        <button class="btn btn-primary w-100 login-btn">Login</button><br><br>
        <button class="btn btn-light w-100 back-btn">⬅ Back</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="d-none">
        <h3>Create Account</h3>

        <input type="text" id="registerId" placeholder="User ID"><br><br>
        <input type="password" id="registerPass" placeholder="Password"><br><br>
        <input type="text" id="registerName" placeholder="Profile Name"><br><br>

        <button class="btn btn-secondary w-100 register-btn">Create Account</button><br><br>
        <button class="btn btn-light w-100 back-btn">⬅ Back</button>
    </div>

</div> 

<!-- 🔥 MAIN APP -->
<div class="app-container d-flex d-none">

    <!-- SIDEBAR -->
    <aside class="sidebar p-3">

        <button class="btn btn-primary w-100 mb-3 new-chat-btn">+ New Chat</button>

        <div class="chat-history flex-grow-1 overflow-auto" id="chatHistory"></div>

        <!-- 🔥 ONLY LOGOUT (profile removed) -->
        <div class="mt-auto text-center">
            <button class="btn btn-danger logout-btn">Logout</button>
        </div>

    </aside>

    <!-- MAIN CHAT -->
    <main class="chat-area flex-grow-1 d-flex flex-column">

        <!-- HEADER -->
<header class="p-3 border-bottom d-flex justify-content-between align-items-center">

    <!-- LEFT SIDE -->
    <div class="d-flex align-items-center gap-2">

        <button class="btn btn-light d-md-none menu-btn">
            <i class="fas fa-bars"></i>
        </button>

        <button class="btn btn-dark mode-btn">🌙</button>

        <h5 class="mb-0">LUNA</h5>

    </div>

    <!-- RIGHT SIDE -->
    <div class="d-flex align-items-center gap-2">

        <div class="header-avatar">R</div>

        <span class="header-username">User</span>

    </div>

</header>

        <!-- WELCOME -->
        <section class="welcome-screen text-center flex-grow-1 d-flex flex-column justify-content-center">

            <i class="fas fa-robot fa-3x mb-3"></i>
            <h2>How can I help you today?</h2>

            <div class="container mt-4">
                <div class="row g-3">

                    <div class="col-md-3">
                        <div class="card p-3 suggestion-card" data-text="Give me creative ideas">
                            <i class="fas fa-lightbulb mb-2"></i>
                            <h6>Ideas</h6>
                            <p>Give me creative ideas</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3 suggestion-card" data-text="Help with coding">
                            <i class="fas fa-code mb-2"></i>
                            <h6>Code</h6>
                            <p>Help with coding</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3 suggestion-card" data-text="Write content">
                            <i class="fas fa-book mb-2"></i>
                            <h6>Learn</h6>
                            <p>Explain concepts</p>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card p-3 suggestion-card" data-text="Write content">
                            <i class="fas fa-pen mb-2"></i>
                            <h6>Write</h6>
                            <p>Write content</p>
                        </div>
                    </div>

                </div>
            </div>

        </section>

        <!-- MESSAGES -->
        <section class="messages p-3 flex-grow-1"></section>

        <!-- TYPING -->
        <div class="typing-indicator px-3 d-none">
            <p>AI is typing...</p>
        </div>

        <!-- INPUT -->
        <section class="input-area p-3 border-top">

            <div class="d-flex align-items-center gap-2">

                <button class="btn btn-light">
                    <i class="fas fa-paperclip"></i>
                </button>

                <textarea class="form-control" rows="1" placeholder="Type your message..."></textarea>

                <!-- SEND -->
                <button class="btn btn-primary send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>

                <!-- STOP -->
                <button class="btn btn-danger stop-btn d-none">
                    <i class="fas fa-stop"></i>
                </button>

            </div>

            <small class="text-muted">Press Enter to send, Shift+Enter for new line</small>

        </section>

    </main>

</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- JS -->
<script src="js/chat.js"></script>

</body>
</html>
